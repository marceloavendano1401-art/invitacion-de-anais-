<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hatsune Miku Special Event: Tu Cumple</title>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --miku-teal: #39c5bb; /* El color icónico de Miku */
            --miku-pink: #ff007f; /* Rosa de los lazos/detalles */
            --bg-dark: #121212;
            --text-main: #ffffff;
        }

       body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            font-family: 'Audiowide', cursive;
            /* La clave está aquí: eliminamos los degradados anteriores */
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://i.pinimg.com/1200x/33/f5/b3/33f5b3e2a2341cca7da80128bc94b393.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .card {
            .card {
            background: rgba(10, 10, 10, 0.85); /* Esto le da un fondo negro traslúcido a la tarjeta */
            border: 4px solid var(--miku-teal);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(57, 197, 187, 0.4);
            max-width: 380px;
            text-align: center;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(5px); /* Esto hace un efecto de vidrio esmerilado muy moderno */
        }

        /* Detalle decorativo de los lazos de Miku */
        .card::before, .card::after {
            content: '';
            position: absolute;
            top: -10px;
            width: 50px;
            height: 20px;
            background: var(--miku-pink);
            border-radius: 5px;
            box-shadow: 0 0 10px var(--miku-pink);
        }
        .card::before { left: 20px; transform: rotate(-15deg); }
        .card::after { right: 20px; transform: rotate(15deg); }

        h1 {
            font-family: 'Press Start 2P', cursive; /* Fuente pixelada para el título */
            font-size: 1.2rem;
            color: var(--miku-teal);
            text-shadow: 2px 2px 0 var(--miku-pink);
            margin-bottom: 5px;
        }

        .event-title {
            font-size: 1.5rem;
            color: var(--miku-pink);
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .miku-icon {
            font-size: 4rem;
            margin: 10px 0;
            color: var(--miku-teal);
            text-shadow: 0 0 15px var(--miku-teal);
        }

        .details {
            text-align: left;
            margin: 25px 0;
            line-height: 1.8;
            border-left: 3px solid var(--miku-pink);
            padding-left: 15px;
        }

        .details div {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }

        .icon {
            color: var(--miku-teal);
            margin-right: 10px;
            font-size: 1.1rem;
        }

        .btn {
            display: block;
            background: transparent;
            color: var(--miku-teal);
            border: 2px solid var(--miku-teal);
            padding: 12px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px; /* Bordes redondeados estilo Miku */
            transition: 0.3s;
            margin-top: 15px;
            text-transform: uppercase;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem;
        }

        .btn:hover {
            background: var(--miku-teal);
            color: var(--bg-dark);
            box-shadow: 0 0 20px var(--miku-teal);
        }

        .btn-rsvp {
            border-color: var(--miku-pink);
            color: var(--miku-pink);
        }

        .btn-rsvp:hover {
            background: var(--miku-pink);
            color: white;
            box-shadow: 0 0 20px var(--miku-pink);
        }

        .footer {
            font-size: 0.7rem;
            margin-top: 25px;
            opacity: 0.6;
            color: var(--miku-teal);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>MIKU FES // B-DAY </h1>
        <div class="event-title">¡CELEBREMOS JUNTOS!</div>
        
        <div <img src="https://wallpaperaccess.com/full/659962.jpg" alt="Miku" style="max-width: 100%; height: auto; border-radius: 10px; margin: 15px 0; border: 2px solid var(--miku-teal); box-shadow: 0 0 10px var(--miku-teal);">
        
        <p>Estás invitado a la fiesta de cumpleaños de:</p>
        <p style="font-size: 1.3rem; color: var(--miku-teal); font-weight: bold;">[Marcela]</p>

        <div class="details">
            <div><span class="icon">📅</span> <span>FECHA:</span>&nbsp; 21/03/2026</div>
            <div><span class="icon">⏰</span> <span>HORA:</span>&nbsp; 18:00 HRS</div>
            <div><span class="icon">📍</span> <span>LUGAR:</span>&nbsp; renca</div>
        </div>

        <a href="https://www.google.com/maps/place/La+Marquesita+3983,+Renca,+Regi%C3%B3n+Metropolitana/@-33.4068998,-70.7045059,17z/data=!3m1!4b1!4m6!3m5!1s0x9662c6a68ab8fa59:0xc95f77267ef0785a!8m2!3d-33.4069043!4d-70.701931!16s%2Fg%2F11knd8sv_4?entry=ttu&g_ep=EgoyMDI2MDMxMS4wIKXMDSoASAFQAw%3D%3D" class="btn" target="_blank">📍 ABRIR MAPA</a>
        <a href="https://wa.me/56948429625" class="btn btn-rsvp">📱 CONFIRMAR</a>

        <div class="footer">
            VOCALOID_PROTOCOL_INITV_01 // <span style="color:var(--miku-pink);">♥</span>
        </div>
    </div>
</body>
</html>
